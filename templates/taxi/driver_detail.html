{% extends "base.html" %}

{% block content %}
  <h1>{{ driver.username }}</h1>
    <p>Cars:</p>
      <ul>
        {% for car in driver.cars.all %}
          <li>{{ car.model }}</li>
          <li>{{ car.manufacturer.name }}</li>
          <li>{{ car.manufacturer.country }}</li>

        {% endfor %}
      </ul>
{% endblock %}
