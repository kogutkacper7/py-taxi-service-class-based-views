{% extends "base.html" %}

{% block content %}
  <h1>Manufacturers list</h1>
  <table class="table table-striped table-hover">
    <thead>
      <tr>
        <th>Name</th>
        <th>Country</th>
      </tr>
    </thead>
    <tbody>

      {% for manufacturer in manufacturer_list %}
        <tr>
          <td>{{ manufacturer.name }}</td>
          <td>{{ manufacturer.country }}</td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="2">There are no manufacturers in data base.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
